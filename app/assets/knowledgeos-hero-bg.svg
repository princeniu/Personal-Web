<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="55%" stop-color="#121216"/>
      <stop offset="100%" stop-color="#15120d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="22%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="72%" r="45%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow1)"/>
  <rect width="1600" height="1000" fill="url(#glow2)"/>

  <!-- Constellation lines -->
  <g stroke="#e8a838" stroke-opacity="0.20" stroke-width="0.9" fill="none">
    <line x1="180" y1="120" x2="420" y2="280"/>
    <line x1="420" y1="280" x2="560" y2="160"/>
    <line x1="420" y1="280" x2="640" y2="420"/>
    <line x1="640" y1="420" x2="380" y2="560"/>
    <line x1="640" y1="420" x2="850" y2="350"/>
    <line x1="850" y1="350" x2="1050" y2="480"/>
    <line x1="850" y1="350" x2="720" y2="200"/>
    <line x1="1050" y1="480" x2="1250" y2="340"/>
    <line x1="1050" y1="480" x2="880" y2="620"/>
    <line x1="1250" y1="340" x2="1420" y2="500"/>
    <line x1="380" y1="560" x2="200" y2="700"/>
    <line x1="880" y1="620" x2="1080" y2="750"/>
    <line x1="560" y1="160" x2="720" y2="200"/>
    <line x1="1250" y1="340" x2="1380" y2="180"/>
  </g>

  <!-- Bright accent paths -->
  <g stroke="#e8a838" stroke-opacity="0.35" stroke-width="1.4" fill="none">
    <line x1="420" y1="280" x2="850" y2="350"/>
    <line x1="850" y1="350" x2="1250" y2="340"/>
    <line x1="640" y1="420" x2="1050" y2="480"/>
  </g>

  <!-- Nodes -->
  <g fill="#e8a838" filter="url(#nodeGlow)">
    <circle cx="180" cy="120" r="4" opacity="0.8"/>
    <circle cx="420" cy="280" r="6" opacity="0.95"/>
    <circle cx="560" cy="160" r="3.5" opacity="0.75"/>
    <circle cx="640" cy="420" r="5" opacity="0.9"/>
    <circle cx="380" cy="560" r="3.5" opacity="0.7"/>
    <circle cx="850" cy="350" r="6.5" opacity="1.0"/>
    <circle cx="1050" cy="480" r="5" opacity="0.85"/>
    <circle cx="1250" cy="340" r="5.5" opacity="0.9"/>
    <circle cx="720" cy="200" r="3" opacity="0.6"/>
    <circle cx="880" cy="620" r="3.5" opacity="0.7"/>
    <circle cx="1420" cy="500" r="3.5" opacity="0.65"/>
    <circle cx="200" cy="700" r="3" opacity="0.55"/>
    <circle cx="1080" cy="750" r="3" opacity="0.6"/>
    <circle cx="1380" cy="180" r="3" opacity="0.6"/>
  </g>

  <!-- Floating particles -->
  <g fill="#e8a838" opacity="0.20">
    <circle cx="310" cy="440" r="1.2"/>
    <circle cx="760" cy="540" r="1.2"/>
    <circle cx="960" cy="220" r="1.2"/>
    <circle cx="1150" cy="620" r="1.2"/>
    <circle cx="520" cy="700" r="1.2"/>
    <circle cx="1320" cy="600" r="1.5"/>
    <circle cx="280" cy="180" r="1.2"/>
    <circle cx="660" cy="80" r="1.2"/>
    <circle cx="1480" cy="280" r="1.2"/>
    <circle cx="480" cy="380" r="1"/>
    <circle cx="920" cy="700" r="1"/>
  </g>
</svg>
