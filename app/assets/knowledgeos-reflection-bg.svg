<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="50%" stop-color="#100f0c"/>
      <stop offset="100%" stop-color="#13110e"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#e8a838" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="edgeGlow" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#coreGlow)"/>
  <rect width="1600" height="1000" fill="url(#edgeGlow)"/>

  <!-- Subtle horizontal structure lines -->
  <g stroke="#e8a838" stroke-opacity="0.07" stroke-width="0.6">
    <line x1="100" y1="180" x2="1500" y2="180"/>
    <line x1="100" y1="340" x2="1500" y2="340"/>
    <line x1="100" y1="500" x2="1500" y2="500"/>
    <line x1="100" y1="660" x2="1500" y2="660"/>
    <line x1="100" y1="820" x2="1500" y2="820"/>
  </g>

  <!-- Diagonal accent lines — slightly brighter -->
  <g stroke="#e8a838" stroke-opacity="0.10" stroke-width="0.7">
    <line x1="200" y1="80" x2="1400" y2="920"/>
    <line x1="600" y1="80" x2="1500" y2="620"/>
    <line x1="80" y1="300" x2="1200" y2="980"/>
  </g>

  <!-- Center anchor nodes -->
  <g fill="#e8a838" filter="url(#softBlur)">
    <circle cx="800" cy="420" r="2.5" opacity="0.50"/>
    <circle cx="720" cy="380" r="2" opacity="0.38"/>
    <circle cx="880" cy="460" r="2" opacity="0.35"/>
    <circle cx="760" cy="500" r="1.5" opacity="0.28"/>
    <circle cx="840" cy="340" r="1.5" opacity="0.28"/>
  </g>

  <!-- Scattered periphery particles -->
  <g fill="#e8a838" opacity="0.14">
    <circle cx="200" cy="250" r="1.2"/>
    <circle cx="1400" cy="180" r="1.2"/>
    <circle cx="350" cy="700" r="1.2"/>
    <circle cx="1250" cy="750" r="1.2"/>
    <circle cx="100" cy="600" r="1"/>
    <circle cx="1500" cy="400" r="1"/>
    <circle cx="600" cy="850" r="1.2"/>
    <circle cx="1100" cy="200" r="1.2"/>
    <circle cx="450" cy="150" r="1"/>
    <circle cx="1300" cy="880" r="1"/>
    <circle cx="300" cy="480" r="1"/>
    <circle cx="1050" cy="550" r="1"/>
  </g>
</svg>
