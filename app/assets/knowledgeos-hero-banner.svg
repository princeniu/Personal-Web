<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#e8a838" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <style>
      .f{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- Hero typography — pure center, no decorations -->
  <g class="f">
    <text x="800" y="410" text-anchor="middle" font-size="130px" font-weight="700" fill="#f4f4f5" letter-spacing="-0.03em">
      Knowledge<tspan fill="#e8a838">OS</tspan>
    </text>

    <text x="800" y="500" text-anchor="middle" font-size="28px" fill="#a1a1aa" letter-spacing="0.01em">
      从碎片信息到可维护的判断
    </text>

    <text x="800" y="542" text-anchor="middle" font-size="20px" fill="#71717a" letter-spacing="-0.01em">
      an agent-driven personal knowledge system
    </text>

    <rect x="648" y="580" width="304" height="38" rx="19" fill="rgba(232,168,56,0.05)" stroke="rgba(232,168,56,0.12)" stroke-width="1"/>
    <text x="800" y="605" text-anchor="middle" font-size="13px" fill="#e8a838" letter-spacing="0.08em">AGENT-MAINTAINED · LOCAL-FIRST</text>
  </g>

  <text x="800" y="940" text-anchor="middle" class="f" font-size="13px" fill="#52525b" letter-spacing="0.06em">OPERATIONAL · LOCAL-FIRST · MARKDOWN SOURCE OF TRUTH · CRON-BACKED</text>
</svg>
