<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <!-- Background gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060609"/>
      <stop offset="60%" stop-color="#0a0907"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>

    <!-- Center atmospheric glow -->
    <radialGradient id="atmosGlow" cx="44%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.14"/>
      <stop offset="35%" stop-color="#e8a838" stop-opacity="0.05"/>
      <stop offset="70%" stop-color="#e8a838" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle top vignette -->
    <radialGradient id="vignette" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#08080c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#08080c" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Core node glow filter -->
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft diffuse glow for orbs -->
    <filter id="softGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowGold" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 L8 4 L0 8z" fill="#e8a838" opacity="0.25"/>
    </marker>

    <style>
      .f{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
      .hero-title{font-size:104px;font-weight:700;fill:#f4f4f5;letter-spacing:-0.03em}
      .hero-gold{fill:#e8a838}
      .sub-cn{font-size:27px;fill:#a1a1aa;letter-spacing:0.01em}
      .sub-en{font-size:22px;fill:#71717a;letter-spacing:-0.01em}
      .tag-pill-label{font-size:13px;fill:#e8a838;letter-spacing:0.08em}
      .card-text{font-size:14px;fill:#a1a1aa;letter-spacing:0.01em}
      .card-text-dim{font-size:14px;fill:#71717a;letter-spacing:0.01em}
      .card-text-out{font-size:14px;fill:#d4d4d8;letter-spacing:0.01em}
      .bottom-strip{font-size:13px;fill:#52525b;letter-spacing:0.06em}
    </style>
  </defs>

  <!-- Background layers -->
  <rect width="1600" height="1000" fill="url(#bgGrad)"/>
  <rect width="1600" height="1000" fill="url(#atmosGlow)"/>

  <!-- ============================================================ -->
  <!-- HERO TYPOGRAPHY -->
  <!-- ============================================================ -->
  <g class="f">
    <text x="800" y="220" text-anchor="middle" class="hero-title">
      Knowledge<tspan class="hero-gold">OS</tspan>
    </text>
    <text x="800" y="305" text-anchor="middle" class="sub-cn">从碎片信息到可维护的判断</text>
    <text x="800" y="348" text-anchor="middle" class="sub-en">an agent-driven personal knowledge system</text>

    <!-- Tag pill -->
    <rect x="648" y="400" width="304" height="36" rx="18" fill="rgba(232,168,56,0.05)" stroke="rgba(232,168,56,0.13)" stroke-width="1"/>
    <text x="800" y="424" text-anchor="middle" class="tag-pill-label">AGENT-MAINTAINED · LOCAL-FIRST</text>
  </g>

  <!-- Subtle divider line -->
  <line x1="200" y1="480" x2="1400" y2="480" stroke="#e8a838" stroke-opacity="0.05" stroke-width="0.5"/>

  <!-- ============================================================ -->
  <!-- FLOW VISUALIZATION — Scattered Inputs → Center KOS → Structured Outputs -->
  <!-- ============================================================ -->

  <!-- Drift particles (atmosphere) -->
  <g fill="#e8a838" opacity="0.06">
    <circle cx="500" cy="520" r="1.8"/>
    <circle cx="620" cy="540" r="1.2"/>
    <circle cx="560" cy="620" r="1.5"/>
    <circle cx="480" cy="680" r="1.0"/>
    <circle cx="530" cy="760" r="1.8"/>
    <circle cx="850" cy="530" r="1.2"/>
    <circle cx="920" cy="580" r="1.5"/>
    <circle cx="880" cy="650" r="1.0"/>
    <circle cx="940" cy="720" r="1.5"/>
    <circle cx="860" cy="780" r="1.2"/>
    <circle cx="680" cy="510" r="1.0"/>
    <circle cx="720" cy="790" r="1.0"/>
  </g>

  <!-- ============================================ -->
  <!-- LEFT: Fragmented Input Sources (scattered, dimmer) -->
  <!-- ============================================ -->
  <g opacity="0.50">
    <!-- Card 1 -->
    <rect x="380" y="530" width="155" height="46" rx="10" fill="#0f0f12" stroke="#1e1e24" stroke-width="0.8"/>
    <text x="457" y="559" text-anchor="middle" class="card-text-dim">Conversations</text>

    <!-- Card 2 -->
    <rect x="310" y="595" width="145" height="46" rx="10" fill="#0f0f12" stroke="#1e1e24" stroke-width="0.8"/>
    <text x="382" y="624" text-anchor="middle" class="card-text-dim">Project updates</text>

    <!-- Card 3 -->
    <rect x="355" y="660" width="145" height="46" rx="10" fill="#0f0f12" stroke="#1e1e24" stroke-width="0.8"/>
    <text x="427" y="689" text-anchor="middle" class="card-text-dim">Research notes</text>

    <!-- Card 4 -->
    <rect x="390" y="725" width="135" height="46" rx="10" fill="#0f0f12" stroke="#1e1e24" stroke-width="0.8"/>
    <text x="457" y="754" text-anchor="middle" class="card-text-dim">Career · ideas</text>
  </g>

  <!-- Flow lines: LEFT → CENTER (converging bezier arcs) -->
  <g fill="none" stroke="#e8a838" stroke-opacity="0.09" stroke-width="1.0">
    <path d="M 535 553 C 570 553, 600 575, 630 595" marker-end="url(#arrowGold)"/>
    <path d="M 455 618 C 510 618, 560 610, 630 605" marker-end="url(#arrowGold)"/>
    <path d="M 500 683 C 540 683, 570 645, 630 620" marker-end="url(#arrowGold)"/>
    <path d="M 525 748 C 565 748, 595 675, 630 635" marker-end="url(#arrowGold)"/>
  </g>

  <!-- ============================================ -->
  <!-- CENTER: KOS Gravitational Core -->
  <!-- ============================================ -->
  <g>
    <!-- Outer orbit rings -->
    <ellipse cx="690" cy="635" rx="140" ry="100" fill="none" stroke="#e8a838" stroke-opacity="0.04" stroke-width="0.8"/>
    <circle cx="690" cy="635" r="108" fill="none" stroke="#e8a838" stroke-opacity="0.05" stroke-width="0.8" stroke-dasharray="4 8"/>
    <circle cx="690" cy="635" r="82" fill="none" stroke="#e8a838" stroke-opacity="0.08" stroke-width="1.0"/>

    <!-- Core node -->
    <circle cx="690" cy="635" r="56" fill="#14120d" stroke="#e8a838" stroke-width="2.0" filter="url(#coreGlow)"/>

    <!-- Inner gold core -->
    <circle cx="690" cy="635" r="38" fill="none" stroke="#e8a838" stroke-opacity="0.20" stroke-width="1.2"/>

    <!-- KOS label -->
    <text x="690" y="649" class="f" font-size="25px" font-weight="700" fill="#f4f4f5" text-anchor="middle" letter-spacing="-0.02em">
      K<tspan fill="#e8a838">OS</tspan>
    </text>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT: Structured Outputs (aligned, clearer, gold-tinted) -->
  <!-- ============================================ -->
  <g opacity="0.68">
    <!-- Card 1 -->
    <rect x="1065" y="530" width="160" height="46" rx="10" fill="#14120d" stroke="#e8a838" stroke-opacity="0.13" stroke-width="1"/>
    <text x="1145" y="559" text-anchor="middle" class="card-text-out">Obsidian views</text>

    <!-- Card 2 -->
    <rect x="1130" y="595" width="160" height="46" rx="10" fill="#14120d" stroke="#e8a838" stroke-opacity="0.13" stroke-width="1"/>
    <text x="1210" y="624" text-anchor="middle" class="card-text-out">Review artifacts</text>

    <!-- Card 3 -->
    <rect x="1050" y="660" width="160" height="46" rx="10" fill="#14120d" stroke="#e8a838" stroke-opacity="0.13" stroke-width="1"/>
    <text x="1130" y="689" text-anchor="middle" class="card-text-out">Portfolio material</text>

    <!-- Card 4 -->
    <rect x="1100" y="725" width="160" height="46" rx="10" fill="#14120d" stroke="#e8a838" stroke-opacity="0.13" stroke-width="1"/>
    <text x="1180" y="754" text-anchor="middle" class="card-text-out">Git backup</text>
  </g>

  <!-- Flow lines: CENTER → RIGHT (radiating bezier arcs) -->
  <g fill="none" stroke="#e8a838" stroke-opacity="0.13" stroke-width="1.1">
    <path d="M 750 610 C 820 580, 920 553, 1060 553" marker-end="url(#arrowGold)"/>
    <path d="M 748 625 C 830 620, 930 618, 1125 618" marker-end="url(#arrowGold)"/>
    <path d="M 748 648 C 810 660, 900 683, 1045 683" marker-end="url(#arrowGold)"/>
    <path d="M 740 660 C 800 700, 900 748, 1095 748" marker-end="url(#arrowGold)"/>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT SIDE: Subtle glow orbs at output nodes -->
  <!-- ============================================ -->
  <g fill="#e8a838" opacity="0.20" filter="url(#softGlow)">
    <circle cx="1145" cy="553" r="2.5"/>
    <circle cx="1210" cy="618" r="2.5"/>
    <circle cx="1130" cy="683" r="2.5"/>
    <circle cx="1180" cy="748" r="2.5"/>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM TRUST STRIP -->
  <!-- ============================================================ -->
  <line x1="320" y1="870" x2="1280" y2="870" stroke="#e8a838" stroke-opacity="0.04" stroke-width="0.5"/>

  <g class="f">
    <text x="800" y="935" text-anchor="middle" class="bottom-strip">OPERATIONAL · LOCAL-FIRST · MARKDOWN SOURCE OF TRUTH · CRON-BACKED</text>
  </g>
</svg>
